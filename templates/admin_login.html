{% extends 'base.html' %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<section class="py-24 bg-primary-dark min-h-screen flex items-center">
    <div class="max-w-md mx-auto px-4 w-full">
        <div class="bg-secondary-dark rounded-2xl p-8 border border-white/5">
            <div class="text-center mb-8">
                <h2 class="font-display text-2xl text-white mb-2">ADMIN LOGIN</h2>
                <p class="text-gray-500 text-sm">Enter password to access admin panel</p>
            </div>
            <form action="{{ url_for('admin_login') }}" method="POST" class="space-y-6">
                <div>
                    <input type="password" name="password" placeholder="Enter admin password" class="w-full px-4 py-3 rounded-xl form-input" required autofocus>
                </div>
                <button type="submit" class="w-full px-6 py-3 bg-accent-blue text-white font-bold rounded-xl hover:scale-105 transition-all">
                    Login
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
